name = "mahjongers-router"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "9c606048aae2b2853a528a201a5bb405"

routes = [
  { pattern = "mahjongers.com/*", zone_name = "mahjongers.com" },
  { pattern = "origin.mahjongers.com/*", zone_name = "mahjongers.com" },
  { pattern = "*/*", zone_name = "mahjongers.com" }
]

# Set these as secrets (not plaintext vars) after deploying:
#   wrangler secret put LANDING_ORIGIN   → e.g. mahjongers-landing.up.railway.app
#   wrangler secret put PLATFORM_ORIGIN  → e.g. mahjongers-production.up.railway.app
